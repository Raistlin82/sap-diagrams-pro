[pytest]
testpaths = tests
markers =
    devonly: test requires a dev-only resource unavailable in CI — the draw.io
        desktop binary, an LLM, OneDrive/CloudStorage paths, assets/brand-pack.local,
        or network access. CI runs with `-m "not devonly"` to exclude these.
        NOTE: as of Task 18 the suite needs ZERO devonly markers — every
        resource-touching test already self-skips at runtime via
        pytest.skip / pytest.mark.skipif / pytest.importorskip (see
        test_icon_atlas.py's brand-pack.local + rasterizer guards and
        test_style_contract.py's jsonschema importorskip), so the whole suite
        passes headlessly on pytest+pillow alone. This marker + the CI filter
        are the forward-looking hook: a future test that HARD-requires such a
        resource (i.e. would error, not skip) should carry @pytest.mark.devonly.
